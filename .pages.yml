media:
  input: public/images
  output: /images
  categories: [image]
  rename: safe

content:
  - name: news
    label: Vijesti
    type: collection
    path: src/content/news
    format: yaml-frontmatter
    filename: "{fields.title}.mdoc"
    view:
      fields: [title, date, summary]
      primary: title
      sort: [date, title]
      search: [title, summary, body]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Naslov
        type: string
        required: true
        description: Naslov vijesti koji se prikazuje na websiteu.
      - name: date
        label: Datum objave
        type: date
        required: true
        options:
          format: yyyy-MM-dd
      - name: summary
        label: Kratki sažetak
        type: text
        description: Kratki opis koji se prikazuje na popisu vijesti.
        options:
          maxlength: 300
      - name: coverImage
        label: Naslovna slika
        type: image
        description: Opcionalna slika koja se prikazuje uz vijest.
        options:
          path: public/images/news
          categories: [image]
          extensions: [jpg, jpeg, png, webp, gif]
          rename: safe
      - name: body
        label: Sadržaj
        type: rich-text
        required: true
        options:
          format: markdown
          switcher: true
          path: public/images/news
          categories: [image]
          extensions: [jpg, jpeg, png, webp, gif]
          rename: safe

  - name: events
    label: Događaji (Upcoming Events)
    type: collection
    path: src/content/events
    format: yaml-frontmatter
    filename: "{fields.title}.md"
    view:
      fields: [title, date, location]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: asc
    fields:
      - name: title
        label: Naslov događaja
        type: string
        required: true
        description: Naziv događaja koji se prikazuje na naslovnici.
      - name: date
        label: Datum
        type: date
        options:
          format: yyyy-MM-dd
        description: Datum događaja. Ostavi prazno ako je "uskoro / detalji slijede".
      - name: dateLabel
        label: Tekst umjesto datuma (opcionalno)
        type: string
        description: Npr. "Uskoro — detalji slijede". Ako je ispunjeno, prikazuje se umjesto datuma.
      - name: time
        label: Vrijeme (opcionalno)
        type: string
        description: Npr. "13:30–14:30".
      - name: location
        label: Lokacija (opcionalno)
        type: string
        description: Npr. "Taipei, Taiwan".
      - name: body
        label: Detalji
        type: rich-text
        options:
          format: markdown

  - name: projects
    label: Service projects
    type: collection
    path: src/content/projects
    format: yaml-frontmatter
    filename: "{fields.slug}.mdoc"
    view:
      fields: [title, slug, order]
      primary: title
      sort: [order, title]
      default:
        sort: order
        order: asc
    fields:
      - name: slug
        label: Slug (URL identifikator)
        type: string
        required: true
        description: "Interni identifikator / URL, npr. ukraine. NE mijenjati nakon objave."
      - name: title
        label: Naslov
        type: string
        required: true
        description: Naslov projekta (prikazuje se kao naslov stranice).
      - name: navLabel
        label: Naziv u izborniku (opcionalno)
        type: string
        description: Ako je prazno, koristi se Naslov.
      - name: order
        label: Redoslijed
        type: number
        description: Manji broj = ranije u popisu i izborniku.
      - name: summary
        label: Kratki sažetak (za karticu)
        type: text
        options:
          maxlength: 200
      - name: coverImage
        label: Naslovna slika
        type: image
        options:
          path: public/images/projects
          categories: [image]
          extensions: [jpg, jpeg, png, webp, gif]
          rename: safe
      - name: metaDescription
        label: SEO opis (za tab i tražilice)
        type: text
        options:
          maxlength: 300
      - name: intro
        label: Uvodni odlomci
        type: text
        description: "Uvod iznad tablice. Svaki prazan red = novi odlomak."
      - name: costCaption
        label: Naslov tablice (opcionalno)
        type: string
        description: "Npr. \"Our support to Ukraine\". Ostavi prazno ako projekt nema tablicu."
      - name: costTable
        label: Tablica troškova (stavke)
        type: object
        list: true
        description: "Svaki red = jedna stavka. Iznos upiši bez znaka £."
        fields:
          - name: label
            label: Stavka
            type: string
          - name: amount
            label: Iznos (bez £)
            type: string
      - name: costTotal
        label: Ukupno (bez £)
        type: string
        description: "Npr. 705,206. Prikazuje se kao zadnji red tablice."
      - name: costNote
        label: Napomena ispod tablice (opcionalno)
        type: text
      - name: body
        label: Sadržaj stranice
        type: rich-text
        options:
          format: markdown
          switcher: true
          path: public/images/projects
          categories: [image]
          extensions: [jpg, jpeg, png, webp, gif]
          rename: safe
